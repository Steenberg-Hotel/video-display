<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  height: 100%;
  cursor: none;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<video id="video" autoplay loop muted playsinline preload="auto">
  <source src="https://steenbergfarm.com/wp-content/uploads/2021/10/STEENBERG-HOTEL-SPA-H.264-WEB-FINAL-V1_1_1.mp4" type="video/mp4">
</video>

<div id="playButton"></div>

<script>
const video = document.getElementById('video');
const playButton = document.getElementById('playButton');

// Play button click
playButton.addEventListener('click', () => {
  video.muted = false;
  video.play();
  playButton.style.display = 'none';
});

// Optional: fallback autoplay muted
video.play().catch(() => {
  // autoplay blocked, button will handle it
});

// Fullscreen attempt
function goFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
}
goFullscreen();
</script>

</body>
</html>
