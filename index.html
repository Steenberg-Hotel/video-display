<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  height: 100%;
  cursor: none;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Play button overlay */
#playButton {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100px;
  height: 100px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* Triangle icon */
#playButton::before {
  content: '';
  border-style: solid;
  border-width: 20px 0 20px 35px;
  border-color: transparent transparent transparent white;
  margin-left: 5px;
}
</style>
</head>

<body>

<video id="video" loop muted playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div id="playButton"></div>

<script>
const video = document.getElementById('video');
const playButton = document.getElementById('playButton');

// Play button click
playButton.addEventListener('click', () => {
  video.muted = false;
  video.play();
  playButton.style.display = 'none';
});

// Optional: fallback autoplay muted
video.play().catch(() => {
  // autoplay blocked, button will handle it
});

// Fullscreen attempt
function goFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
}
goFullscreen();
</script>

</body>
</html>
